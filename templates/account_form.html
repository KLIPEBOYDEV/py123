{% extends "base.html" %}
{% block title %}Изменить логин/пароль{% endblock %}
{% block topbar_title %}Изменить логин/пароль{% endblock %}

{% block content %}
<div class="card" style="max-width: 560px;">
  <form method="POST">
    <div class="form-grid">
      <div class="form-group full">
        <label>Пользователь</label>
        <input type="text" value="{{ user.name }} ({{ 'Админ' if user.role == 'admin' else 'Тренер' }})" disabled>
      </div>
      <div class="form-group full">
        <label>Логин *</label>
        <input type="text" name="username" value="{{ user.username }}" required>
      </div>
      <div class="form-group full">
        <label>Новый пароль</label>
        <input type="password" name="password" placeholder="Оставьте пустым, чтобы не менять">
      </div>
    </div>
    <div class="divider"></div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Сохранить</button>
      <a href="{{ url_for('accounts') }}" class="btn btn-secondary">Отмена</a>
    </div>
  </form>
</div>
{% endblock %}
