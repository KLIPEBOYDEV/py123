{% extends "base.html" %}
{% block title %}{{ 'Редактировать' if client else 'Добавить' }} клиента{% endblock %}
{% block topbar_title %}{{ 'Редактировать' if client else 'Добавить' }} клиента{% endblock %}

{% block content %}
<div class="card" style="max-width: 640px">
  <form method="POST">
    <div class="form-grid">
      <div class="form-group full">
        <label>Полное имя *</label>
        <input type="text" name="name" value="{{ client.name if client else '' }}" required placeholder="Иванов Иван Иванович">
      </div>
      <div class="form-group">
        <label>Телефон</label>
        <input type="tel" name="phone" value="{{ client.phone if client else '' }}" placeholder="+7 (999) 000-00-00">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" value="{{ client.email if client else '' }}" placeholder="client@example.com">
      </div>
      <div class="form-group">
        <label>Дата рождения</label>
        <input type="date" name="birthdate" value="{{ client.birthdate if client else '' }}">
      </div>
      <div class="form-group">
        <label>Родитель / опекун</label>
        <div style="display: flex; gap: 8px; align-items: center;">
          <input type="hidden" name="parent_id" id="parent_id" value="{{ client.parent_id if client else '' }}">
          <input type="text" id="parent_search" placeholder="Начните вводить имя или фамилию" autocomplete="off" value="{{ all_clients | selectattr('id', 'equalto', client.parent_id) | map(attribute='name') | first if client and client.parent_id else '' }}">
          <button type="button" id="clear_parent" class="btn btn-secondary btn-sm" style="padding: 6px 10px;">✕</button>
        </div>
      </div>
      <div class="form-group full">
        <label>Заметки</label>
        <textarea name="notes">{{ client.notes if client else '' }}</textarea>
      </div>
    </div>
    <div class="divider"></div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">{{ 'Сохранить' if client else 'Добавить' }}</button>
      <a href="{{ url_for('clients') }}" class="btn btn-secondary">Отмена</a>
    </div>
  </form>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    const nameInput = document.querySelector('input[name="name"]');
    let suggestions = [];
    let currentIndex = -1;

    nameInput.addEventListener('input', function() {
        const query = this.value.trim();
        if (query.length < 2) {
            hideSuggestions();
            return;
        }
        fetch(`/api/clients/search?q=${encodeURIComponent(query)}`)
            .then(response => response.json())
            .then(data => {
                suggestions = data;
                showSuggestions(data);
            });
    });

    function showSuggestions(sugs) {
        hideSuggestions();
        if (sugs.length === 0) return;

        const list = document.createElement('ul');
        list.className = 'autocomplete-list';
        list.style.cssText = `
            position: absolute;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 1000;
            width: 100%;
            list-style: none;
            padding: 0;
            margin: 0;
        `;

        sugs.forEach((sug, index) => {
            const item = document.createElement('li');
            item.textContent = sug;
            item.style.cssText = `
                padding: 8px 12px;
                cursor: pointer;
                color: var(--text);
            `;
            item.addEventListener('click', () => {
                nameInput.value = sug;
                hideSuggestions();
            });
            item.addEventListener('mouseenter', () => {
                currentIndex = index;
                highlightItem();
            });
            list.appendChild(item);
        });

        const wrapper = document.createElement('div');
        wrapper.style.position = 'relative';
        nameInput.parentNode.insertBefore(wrapper, nameInput);
        wrapper.appendChild(nameInput);
        wrapper.appendChild(list);
        wrapper.style.position = 'relative';
        nameInput.style.width = '100%';
    }

    function hideSuggestions() {
        const list = document.querySelector('.autocomplete-list');
        if (list) list.remove();
        const wrapper = nameInput.parentNode;
        if (wrapper && wrapper.tagName === 'DIV' && wrapper.style.position === 'relative') {
            wrapper.parentNode.insertBefore(nameInput, wrapper);
            wrapper.remove();
        }
        currentIndex = -1;
    }

    nameInput.addEventListener('keydown', function(e) {
        const list = document.querySelector('.autocomplete-list');
        if (!list) return;

        const items = list.querySelectorAll('li');
        if (e.key === 'ArrowDown') {
            e.preventDefault();
            currentIndex = (currentIndex + 1) % items.length;
            highlightItem();
        } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            currentIndex = currentIndex <= 0 ? items.length - 1 : currentIndex - 1;
            highlightItem();
        } else if (e.key === 'Enter' && currentIndex >= 0) {
            e.preventDefault();
            items[currentIndex].click();
        } else if (e.key === 'Escape') {
            hideSuggestions();
        }
    });

    function highlightItem() {
        const items = document.querySelectorAll('.autocomplete-list li');
        items.forEach((item, index) => {
            item.style.background = index === currentIndex ? 'var(--accent)' : 'transparent';
        });
    }

    document.addEventListener('click', function(e) {
        if (!nameInput.contains(e.target) && !e.target.closest('.autocomplete-list')) {
            hideSuggestions();
        }
    });
});

// Parent search
(function() {
    const clientId = {{ client_id or 'null' }};
    const parentSearch = document.getElementById('parent_search');
    const parentId = document.getElementById('parent_id');
    const clearBtn = document.getElementById('clear_parent');
    let parentSuggestions = [];
    let parentCurrentIndex = -1;

    clearBtn.addEventListener('click', function() {
        parentSearch.value = '';
        parentId.value = '';
        hideParentSuggestions();
    });

    parentSearch.addEventListener('input', function() {
        const query = this.value.trim();
        if (query.length < 2) {
            hideParentSuggestions();
            return;
        }
        fetch(`/api/clients/search?q=${encodeURIComponent(query)}`)
            .then(response => response.json())
            .then(data => {
                parentSuggestions = data.filter(sug => sug.id !== clientId);
                showParentSuggestions(parentSuggestions);
            });
    });

    function showParentSuggestions(sugs) {
        hideParentSuggestions();
        if (sugs.length === 0) return;

        const list = document.createElement('ul');
        list.className = 'autocomplete-list-parent';
        list.style.cssText = `
            position: absolute;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 1000;
            width: 100%;
            list-style: none;
            padding: 0;
            margin: 0;
        `;

        sugs.forEach((sug, index) => {
            const item = document.createElement('li');
            item.textContent = sug.name;
            item.dataset.id = sug.id;
            item.style.cssText = `
                padding: 8px 12px;
                cursor: pointer;
                color: var(--text);
            `;
            item.addEventListener('click', () => {
                parentSearch.value = sug.name;
                parentId.value = sug.id;
                hideParentSuggestions();
            });
            item.addEventListener('mouseenter', () => {
                parentCurrentIndex = index;
                highlightParentItem();
            });
            list.appendChild(item);
        });

        const wrapper = document.createElement('div');
        wrapper.style.position = 'relative';
        parentSearch.parentNode.insertBefore(wrapper, parentSearch);
        wrapper.appendChild(parentSearch);
        wrapper.appendChild(list);
        parentSearch.style.width = '100%';
    }

    function hideParentSuggestions() {
        const list = document.querySelector('.autocomplete-list-parent');
        if (list) list.remove();
        const wrapper = parentSearch.parentNode;
        if (wrapper && wrapper.tagName === 'DIV' && wrapper.style.position === 'relative') {
            wrapper.parentNode.insertBefore(parentSearch, wrapper);
            wrapper.remove();
        }
        parentCurrentIndex = -1;
    }

    parentSearch.addEventListener('keydown', function(e) {
        const list = document.querySelector('.autocomplete-list-parent');
        if (!list) return;

        const items = list.querySelectorAll('li');
        if (e.key === 'ArrowDown') {
            e.preventDefault();
            parentCurrentIndex = (parentCurrentIndex + 1) % items.length;
            highlightParentItem();
        } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            parentCurrentIndex = parentCurrentIndex <= 0 ? items.length - 1 : parentCurrentIndex - 1;
            highlightParentItem();
        } else if (e.key === 'Enter' && parentCurrentIndex >= 0) {
            e.preventDefault();
            items[parentCurrentIndex].click();
        } else if (e.key === 'Escape') {
            hideParentSuggestions();
        }
    });

    function highlightParentItem() {
        const list = document.querySelector('.autocomplete-list-parent');
        if (!list) return;
        const items = list.querySelectorAll('li');
        items.forEach((item, index) => {
            item.style.background = index === parentCurrentIndex ? 'var(--accent)' : 'transparent';
        });
    }

    document.addEventListener('click', function(e) {
        if (!parentSearch.contains(e.target) && !e.target.closest('.autocomplete-list-parent')) {
            hideParentSuggestions();
        }
    });
})();
</script>
{% endblock %}
